name: binary-build

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: binary-build::${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_CACHE_SAVE: "true"

jobs:
  build-linux-x86_64:
    name: Build Linux x86_64 release binary
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci
        with:
          cache-key: binary-build
          cache-workspace-crates: "true"
          save-cache: ${{ env.RUST_CACHE_SAVE }}

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package binary artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/release/interspire-mcp dist/interspire-mcp
          strip dist/interspire-mcp || true
          tar -C dist -czf dist/interspire-mcp-linux-x86_64.tar.gz interspire-mcp
          (cd dist && sha256sum interspire-mcp-linux-x86_64.tar.gz > interspire-mcp-linux-x86_64.tar.gz.sha256)

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: interspire-mcp-linux-x86_64
          path: |
            dist/interspire-mcp-linux-x86_64.tar.gz
            dist/interspire-mcp-linux-x86_64.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7
