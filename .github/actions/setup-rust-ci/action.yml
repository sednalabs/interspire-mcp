name: Setup Rust CI
description: Install Rust and restore a shared Cargo cache for public CI jobs.

inputs:
  components:
    description: Comma-separated Rust components to install.
    required: false
    default: ""
  cache-key:
    description: Stable cache key suffix shared by related jobs.
    required: false
    default: workspace
  cache-targets:
    description: Whether to cache Cargo target directories.
    required: false
    default: "true"
  cache-all-crates:
    description: Whether to cache all compiled crates rather than dependencies only.
    required: false
    default: "true"
  cache-workspace-crates:
    description: Whether to cache compiled workspace crates.
    required: false
    default: "false"
  save-cache:
    description: Whether this job may save a cache entry.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      if: ${{ inputs.components == '' }}
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

    - name: Install Rust toolchain with components
      if: ${{ inputs.components != '' }}
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      with:
        components: ${{ inputs.components }}

    - name: Restore shared Cargo cache
      uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      with:
        shared-key: interspire-mcp-${{ inputs.cache-key }}
        cache-targets: ${{ inputs.cache-targets }}
        cache-all-crates: ${{ inputs.cache-all-crates }}
        cache-workspace-crates: ${{ inputs.cache-workspace-crates }}
        cache-on-failure: "false"
        save-if: ${{ inputs.save-cache }}
