[graph]
targets = []
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
  # Transitive through scraper -> selectors. The advisory is maintenance-status
  # only, not a known vulnerability. Track replacement in dependency governance.
  "RUSTSEC-2025-0057",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MIT",
  "MPL-2.0",
  "CDLA-Permissive-2.0",
  "Unicode-3.0",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/sednalabs/mcp-toolkit-rs"]
