name: CodeQL query tests

on:
  pull_request:
    paths:
      - ".github/codeql/actions-workflow-security/**"
      - ".github/workflows/codeql.yml"
      - ".github/workflows/codeql-query-tests.yml"
  push:
    branches:
      - main
    paths:
      - ".github/codeql/actions-workflow-security/**"
      - ".github/workflows/codeql.yml"
      - ".github/workflows/codeql-query-tests.yml"
  workflow_dispatch:

permissions:
  contents: read
  security-events: read

concurrency:
  group: codeql-query-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: Compile custom CodeQL packs
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up CodeQL
        id: setup-codeql
        uses: github/codeql-action/setup-codeql@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: actions

      - name: Install action-workflow CodeQL pack dependencies
        run: |
          "${{ steps.setup-codeql.outputs.codeql-path }}" pack install .github/codeql/actions-workflow-security

      - name: Resolve custom queries
        run: |
          "${{ steps.setup-codeql.outputs.codeql-path }}" resolve queries .github/codeql/actions-workflow-security

      - name: Compile custom action-workflow queries
        run: |
          "${{ steps.setup-codeql.outputs.codeql-path }}" query compile .github/codeql/actions-workflow-security/*.ql
