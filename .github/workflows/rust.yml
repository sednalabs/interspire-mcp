name: rust-baseline

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-baseline::${{ github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_CACHE_SAVE: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

jobs:
  metadata:
    name: Cargo metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci
        with:
          cache-key: baseline
          cache-targets: "false"
          save-cache: ${{ env.RUST_CACHE_SAVE }}

      - name: Check package metadata
        run: cargo metadata --locked --no-deps --format-version 1 > cargo-metadata.json

      - name: Upload metadata artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: cargo-metadata
          path: cargo-metadata.json
          if-no-files-found: error
          retention-days: 7

  fmt:
    name: Rust formatting
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci
        with:
          components: rustfmt
          cache-key: baseline
          cache-targets: "false"
          save-cache: ${{ env.RUST_CACHE_SAVE }}

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Rust clippy
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci
        with:
          components: clippy
          cache-key: baseline
          cache-workspace-crates: "true"
          save-cache: ${{ env.RUST_CACHE_SAVE }}

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test-lib:
    name: Test library
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci
        with:
          cache-key: baseline
          cache-workspace-crates: "true"
          save-cache: ${{ env.RUST_CACHE_SAVE }}

      - name: Run library tests
        run: cargo test --workspace --lib --all-features

  test-cli:
    name: Test CLI smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci
        with:
          cache-key: baseline
          cache-workspace-crates: "true"
          save-cache: ${{ env.RUST_CACHE_SAVE }}

      - name: Run CLI smoke tests
        run: cargo test --test cli_smoke --all-features

  test-domain-contracts:
    name: Test domain contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci
        with:
          cache-key: baseline
          cache-workspace-crates: "true"
          save-cache: ${{ env.RUST_CACHE_SAVE }}

      - name: Run domain contract tests
        run: cargo test --test domain_contracts --all-features

  test-stdio:
    name: Test stdio smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci
        with:
          cache-key: baseline
          cache-workspace-crates: "true"
          save-cache: ${{ env.RUST_CACHE_SAVE }}

      - name: Run stdio smoke tests
        run: cargo test --test stdio_smoke --all-features

  test-tool-schema:
    name: Test tool schema snapshot
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci
        with:
          cache-key: baseline
          cache-workspace-crates: "true"
          save-cache: ${{ env.RUST_CACHE_SAVE }}

      - name: Run tool schema snapshot test
        run: cargo test --test tool_schema_snapshot --all-features

  rust-baseline:
    name: Run Rust baseline
    needs:
      - metadata
      - fmt
      - clippy
      - test-lib
      - test-cli
      - test-domain-contracts
      - test-stdio
      - test-tool-schema
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Summarize fanout
        shell: bash
        run: |
          set -euo pipefail
          echo "metadata: ${{ needs.metadata.result }}"
          echo "fmt: ${{ needs.fmt.result }}"
          echo "clippy: ${{ needs.clippy.result }}"
          echo "test-lib: ${{ needs.test-lib.result }}"
          echo "test-cli: ${{ needs.test-cli.result }}"
          echo "test-domain-contracts: ${{ needs.test-domain-contracts.result }}"
          echo "test-stdio: ${{ needs.test-stdio.result }}"
          echo "test-tool-schema: ${{ needs.test-tool-schema.result }}"
          if [[ '${{ needs.metadata.result }}' != 'success' ||
            '${{ needs.fmt.result }}' != 'success' ||
            '${{ needs.clippy.result }}' != 'success' ||
            '${{ needs.test-lib.result }}' != 'success' ||
            '${{ needs.test-cli.result }}' != 'success' ||
            '${{ needs.test-domain-contracts.result }}' != 'success' ||
            '${{ needs.test-stdio.result }}' != 'success' ||
            '${{ needs.test-tool-schema.result }}' != 'success' ]]; then
            echo 'One or more Rust baseline fanout jobs failed.'
            exit 1
          fi
